<!DOCTYPE html>
<html lang="en-us">

<audio id="soundtrack">  
<source src='Hit%20the%20child%20with%20a%20hammer%20soundtrack.mp3' type="audio/mpeg">
</audio>

<body>
<img src="hit%20the%20child%20with%20a%20hammer%201.png" id="hitter"><br/>
<h1 id="thetitle">Hit The Child With A Hammer<font color="#00ce00" id="mv"> Musical version</font><br/><br/> Score: <score id="score">0</score><br/>Time: <timer id="timer">170</timer></h1><br/>
<button class="boxed" onclick="delayofthething(), timer(), playmusic()" id="start"><font size=20>Start</font></button><button class="boxed" id="button" onclick="change()"><font size=20>Hit Him</font></button><button class="boxed" id="button2" onclick="change()"><font size=20>Hit Him</font></button><button class="boxed" id="button3" onclick="change()"><font size=20>Hit Him</font></button>

<script>

var amount = 0
var turn = 0
var time = 170


function playmusic() {
    document.getElementById("soundtrack").play()
}

function delayofthething() {
    document.getElementById("start").style.display = "none"
    turn = 0
    document.getElementById("button").style.display = "none"
    document.getElementById("button2").style.display = "none"
    document.getElementById("button3").style.display = "none"
    var mathrandom = (Math.floor((Math.random() * 5000) + 700))
    turn = 1
    setTimeout(visible, mathrandom)}

function visible() {
    var ids = ['button', 'button2', 'button3']
    var chosenid = ids[Math.floor(Math.random() * ids.length)]
    document.getElementById(chosenid).style.display = "inline"
    var mathrandom = (1000)
    setTimeout(delayofthething, mathrandom)
}

function timer() {
    localStorage.setItem("score",amount)
    if (time == 0) {window.location.assign("timerfinished.html")}
    document.getElementById("timer").innerHTML = time
        time = time - 1
        setTimeout(timer, 500)}

function change() {
    amount = amount + 1
    document.getElementById("score").innerHTML = amount
    document.getElementById("hitter").src = "hit%20the%20child%20with%20a%20hammer%202.png"
    setTimeout(changeback, 300)
    function changeback() {
        document.getElementById("hitter").src= "hit%20the%20child%20with%20a%20hammer%201.png"
    }}

</script>

</body>
