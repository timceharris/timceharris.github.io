<!DOCTYPE html>
<html onload="" lang="en-us">
<head>
<link rel="stylesheet" href="../css/poll_clicked.css">
</head>
<div id="cookies" style="display: inline">
<h1><font class="cookies_text" color="white">
    
    This Website uses cookies to enhance your experience<br/><br/>
    By using this service you accept the use of cookies<br/><br/></font>
    <cookieagree><font color="white">By pressing close, you agree to the <a href="html/Cookie%20policy.html">Cookie Policy</a> and accept all cookies </font><cookiego onclick="cookieagree()" onmouseover="document.body.style.cursor = 'pointer'" onmouseout="document.body.style.cursor = 'default'">Close</cookiego></cookieagree>
    
    </h1>
</div>
<body id="body">
</body>
<script>
document.getElementById("body").innerHTML = ("choice=" + getParameterByName('choice'))
if (getParameterByName('choice') == null) {
    console.log(null)
    window.location.assign("../index.html")
    }
function getParameterByName(name, url) {
    if (!url) url = window.location.href;
    name = name.replace(/[\[\]]/g, '\\$&');
    var regex = new RegExp('[?&]' + name + '(=([^&#]*)|&|#|$)'),
        results = regex.exec(url);
    if (!results) return null;
    if (!results[2]) return '';
    return decodeURIComponent(results[2].replace(/\+/g, ' '));
}

if("cookieaccept" in localStorage){
   document.getElementById('cookies').style.display = 'none'; 
} else {
}

function cookieagree() {
    document.getElementById("cookies").style.display = "none";
    localStorage.setItem("cookieaccept", "true");
}

</script>
</html>
